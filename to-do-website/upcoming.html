<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming Tasks</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">
<div class="flex h-screen">
        <div id="sidebar">
            <div class="flex-1 p-10">
                <h1 class="text-3xl font-bold">Today</h1>
            </div>
        </div>

    <div>
        <!-- Main Content -->
        <div class="flex-1 p-10 space-y-6">
            <div class="flex items-center gap-3">
                <h1 class="text-3xl font-bold">Upcoming</h1>
                <span id="totalCount" class="bg-gray-200 px-3 py-1 rounded text-sm">0</span>
            </div>
            
            <!-- Today Section -->
            <div class="bg-white p-6 rounded border">
                <h2 class="font-semibold mb-4">Today</h2>
                <input id="todayInput" placeholder="+ Add New Task" class="w-full border p-2 rounded mb-3"/>
                <ul id="todayList" class="space-y-2"></ul>
            </div>
            
            <!-- Tomorrow + Week -->
            <div class="grid grid-cols-2 gap-6">
                <!-- Tomorrow -->
                <div class="bg-white p-6 rounded border">
                    <h2 class="font-semibold mb-4">Tomorrow</h2>
                    <input id="tomorrowInput" placeholder="+ Add New Task" class="w-full border p-2 rounded mb-3"/>
                    <ul id="tomorrowList" class="space-y-2"></ul>
                </div>
                <!-- This Week -->
                <div class="bg-white p-6 rounded border">
                    <h2 class="font-semibold mb-4">This Week</h2>
                    <input id="weekInput" placeholder="+ Add New Task" class="w-full border p-2 rounded mb-3"/>
                    <ul id="weekList" class="space-y-2"></ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="sidebar.js"></script>
<script src="upcoming.js"></script>

</body>
</html>
