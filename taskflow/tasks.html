<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager – TaskFlow</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:.75rem;font-weight:500;font-size:.875rem;transition:all .2s;color:inherit;text-decoration:none}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(124,58,237,.1);color:#7c3aed}
    .dark .sidebar-link:hover,.dark .sidebar-link.active{background:rgba(124,58,237,.2);color:#a78bfa}
    .task-item{transition:all .25s ease}
    .task-item.dragging{opacity:.5;transform:scale(.98)}
    .task-item.drag-over{border-top:2px solid #7c3aed}
    @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    .task-item{animation:slideIn .3s ease forwards}
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white font-sans min-h-screen transition-colors duration-300">

<script>
if(localStorage.getItem("taskflow-theme") === "dark"){
  document.documentElement.classList.add("dark");
}
</script>

<div class="flex min-h-screen">

  <aside class="hidden md:flex flex-col w-64 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4 fixed inset-y-0 left-0 z-40">
    <a href="index.html" class="flex items-center gap-2.5 mb-8 p-2">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600 to-pink-500 flex items-center justify-center shadow-lg text-white text-lg">✓</div>
      <span class="font-bold text-xl">TaskFlow</span>
    </a>
    <nav class="flex-1 space-y-1">
      <a href="dashboard.html" class="sidebar-link">📋 Dashboard</a>
      <a href="tasks.html" class="sidebar-link active">✅ Task Manager</a>
      <a href="calendar.html" class="sidebar-link">📅 Calendar</a>
      <a href="notes.html" class="sidebar-link">📝 Sticky Notes</a>
      <a href="stats.html" class="sidebar-link">📊 Stats</a>
    </nav>
    <button onclick="toggleDark()" class="sidebar-link mt-auto" id="darkBtn">🌙 Dark Mode</button>
  </aside>

  <main class="flex-1 md:ml-64 pb-24 md:pb-0">
    <header class="sticky top-0 z-30 bg-white/90 dark:bg-gray-900/90 backdrop-blur border-b border-gray-200 dark:border-gray-800 px-4 md:px-8 h-16 flex items-center justify-between">
      <h1 class="font-bold text-xl">Task Manager ✅</h1>
      <button onclick="openAddModal()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-violet-600 hover:bg-violet-700 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/30">+ Add Task</button>
    </header>

    <div class="p-4 md:p-8">

      <div class="flex flex-wrap gap-3 mb-6">
        <select id="filterCat" onchange="renderTasks()" class="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
          <option value="">All Categories</option>
          <option value="work">💼 Work</option>
          <option value="personal">🏠 Personal</option>
          <option value="shopping">🛒 Shopping</option>
          <option value="health">💪 Health</option>
          <option value="other">📌 Other</option>
        </select>
        <select id="filterPri" onchange="renderTasks()" class="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
          <option value="">All Priorities</option>
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
        <select id="filterStatus" onchange="renderTasks()" class="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
          <option value="">All Status</option>
          <option value="pending">⏳ Pending</option>
          <option value="completed">✅ Completed</option>
        </select>
        <input id="searchInput" oninput="renderTasks()" type="search" placeholder="🔍 Search tasks..." class="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 flex-1 min-w-[180px]"/>
      </div>

      <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden">
        <div id="taskList" class="divide-y divide-gray-50 dark:divide-gray-700/50 min-h-[120px]"></div>
      </div>
    </div>
  </main>
</div>

<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 flex">
  <a href="dashboard.html" class="flex-1 flex flex-col items-center gap-0.5 py-3 text-gray-500 dark:text-gray-400"><span class="text-xl">📋</span><span class="text-[10px] font-medium">Home</span></a>
  <a href="tasks.html" class="flex-1 flex flex-col items-center gap-0.5 py-3 text-violet-600 dark:text-violet-400"><span class="text-xl">✅</span><span class="text-[10px] font-medium">Tasks</span></a>
  <a href="calendar.html" class="flex-1 flex flex-col items-center gap-0.5 py-3 text-gray-500 dark:text-gray-400"><span class="text-xl">📅</span><span class="text-[10px] font-medium">Calendar</span></a>
  <a href="notes.html" class="flex-1 flex flex-col items-center gap-0.5 py-3 text-gray-500 dark:text-gray-400"><span class="text-xl">📝</span><span class="text-[10px] font-medium">Notes</span></a>
  <a href="stats.html" class="flex-1 flex flex-col items-center gap-0.5 py-3 text-gray-500 dark:text-gray-400"><span class="text-xl">📊</span><span class="text-[10px] font-medium">Stats</span></a>
</nav>

<div id="addModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onclick="closeOnBack(event)">
  <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl" onclick="event.stopPropagation()">
    <h2 class="font-bold text-xl mb-5" id="modalTitle">Add New Task ✨</h2>
    <input type="hidden" id="editId"/>
    <div class="space-y-4">
      <input id="taskTitle" type="text" placeholder="Task title *" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-violet-400 text-sm"/>
      <textarea id="taskDesc" placeholder="Description (optional)..." rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-violet-400 text-sm resize-none"></textarea>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5">Priority</label>
          <select id="taskPriority" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5">Category</label>
          <select id="taskCategory" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
            <option value="work">💼 Work</option>
            <option value="personal">🏠 Personal</option>
            <option value="shopping">🛒 Shopping</option>
            <option value="health">💪 Health</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5">Due Date</label>
        <input id="taskDate" type="date" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"/>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="closeModal()" class="flex-1 py-3 rounded-xl border border-gray-200 dark:border-gray-600 font-semibold text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Cancel</button>
      <button onclick="saveTask()" class="flex-1 py-3 rounded-xl bg-violet-600 hover:bg-violet-700 text-white font-semibold text-sm transition-colors shadow-lg shadow-violet-600/30" id="saveBtn">Add Task</button>
    </div>
  </div>
</div>

<script src="tasks.js"></script>
</body>
</html>
