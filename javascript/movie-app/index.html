<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-in-out;
      }
      .animate-spin {
        animation: spin 1s linear infinite;
      }
      .movie-card {
        transition: all 0.3s ease;
      }
      .movie-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
      }
      .poster-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white min-h-screen">

    <nav class="bg-gray-800 shadow-lg sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div
          class="flex flex-col md:flex-row items-center justify-between gap-4"
        >
          <h1
            class="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500"
          >
            Movie Explorer
          </h1>
          <div class="w-full md:w-96 flex gap-2">
            <input
              type="text"
              id="searchInput"
              placeholder="Search movies..."
              class="flex-1 px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
            <button
              id="searchBtn"
              class="px-6 py-2 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg font-semibold hover:shadow-lg transition"
            >
              Search
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div
      id="loadingSpinner"
      class="hidden flex items-center justify-center py-16"
    >
      <div class="flex flex-col items-center gap-4">
        <div
          class="w-12 h-12 border-4 border-gray-700 border-t-blue-500 rounded-full animate-spin"
        ></div>
        <p class="text-gray-400">Loading movies...</p>
      </div>
    </div>

    <div id="noResults" class="hidden text-center py-16">
      <p class="text-2xl text-gray-400 mb-4">No movies found</p>
      <p class="text-gray-500">Try searching for a different title.</p>
    </div>

    <section class="max-w-7xl mx-auto px-4 py-10">
      <div
        id="movieGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
      >

      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
